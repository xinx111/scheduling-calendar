<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 日历主体 -->
  <rect x="76" y="116" width="360" height="320" rx="32" fill="white" fill-opacity="0.95"/>
  <!-- 日历顶部红色条 -->
  <rect x="76" y="116" width="360" height="80" rx="32" fill="#4F46E5"/>
  <rect x="76" y="148" width="360" height="48" fill="#4F46E5"/>
  <!-- 日历数字 31 -->
  <text x="256" y="330" font-family="Arial, sans-serif" font-size="160" font-weight="bold" text-anchor="middle" fill="#1E293B">31</text>
  <!-- 顶部小字 -->
  <text x="256" y="170" font-family="Arial, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" fill="white">排班日历</text>
  <!-- 装饰圆点 -->
  <circle cx="156" cy="200" r="8" fill="#F59E0B" opacity="0.8"/>
  <circle cx="196" cy="200" r="8" fill="#3B82F6" opacity="0.8"/>
  <circle cx="236" cy="200" r="8" fill="#10B981" opacity="0.8"/>
  <circle cx="276" cy="200" r="8" fill="#EF4444" opacity="0.8"/>
</svg>
